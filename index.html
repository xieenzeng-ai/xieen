<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI & 热量计算器｜碳循环减脂计划</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>BMI 与减脂热量计算器</h1>
        <p>输入基础信息，自动得到 BMI、每日减脂热量与碳循环三大营养素建议。</p>
      </header>

      <section class="card">
        <h2>基础信息</h2>
        <form id="calc-form">
          <div class="grid">
            <label>
              性别
              <select id="gender" required>
                <option value="male">男</option>
                <option value="female">女</option>
              </select>
            </label>
            <label>
              年龄
              <input id="age" type="number" min="14" max="80" required value="28" />
            </label>
            <label>
              身高（cm）
              <input id="height" type="number" min="120" max="230" required value="170" />
            </label>
            <label>
              体重（kg）
              <input id="weight" type="number" min="30" max="250" step="0.1" required value="70" />
            </label>
            <label>
              活动系数
              <select id="activity" required>
                <option value="1.2">久坐（几乎不运动）</option>
                <option value="1.375">轻量活动（每周 1-3 次）</option>
                <option value="1.55" selected>中等活动（每周 3-5 次）</option>
                <option value="1.725">高强度活动（每周 6-7 次）</option>
                <option value="1.9">体力劳动 / 双练</option>
              </select>
            </label>
            <label>
              减脂热量缺口
              <select id="deficit" required>
                <option value="0.1">10%（温和）</option>
                <option value="0.15">15%（标准）</option>
                <option value="0.2" selected>20%（积极）</option>
                <option value="0.25">25%（较激进）</option>
              </select>
            </label>
          </div>
          <button type="submit">开始计算</button>
        </form>
      </section>

      <section class="card" id="result" hidden>
        <h2>你的结果</h2>
        <div class="result-grid">
          <article>
            <h3>BMI</h3>
            <p id="bmi-value"></p>
            <small id="bmi-label"></small>
          </article>
          <article>
            <h3>基础代谢（BMR）</h3>
            <p id="bmr-value"></p>
          </article>
          <article>
            <h3>维持热量（TDEE）</h3>
            <p id="tdee-value"></p>
          </article>
          <article>
            <h3>减脂目标热量</h3>
            <p id="cut-value"></p>
          </article>
        </div>

        <h3>碳循环减脂计划（每日报表）</h3>
        <table>
          <thead>
            <tr>
              <th>日类型</th>
              <th>建议场景</th>
              <th>总热量</th>
              <th>蛋白质</th>
              <th>脂肪</th>
              <th>碳水</th>
            </tr>
          </thead>
          <tbody id="macro-body"></tbody>
        </table>

        <p class="tip">
          周安排建议：高碳 2 天（腿/背等大肌群训练日）、中碳 3 天（常规训练日）、低碳 2 天（休息或低强度有氧日）。
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
