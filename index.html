<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BMI 与碳循环减脂计划</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    background: linear-gradient(140deg, #4facfe, #00f2fe);
    min-height: 100vh;
    padding: 24px;
    color: #1f2937;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,.18);
    padding: 24px;
  }
  h1 { margin: 0 0 8px; font-size: 28px; text-align: center; }
  .subtitle { text-align: center; color: #4b5563; margin-bottom: 20px; }
  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  }
  label { font-size: 14px; font-weight: 600; }
  input, select {
    width: 100%;
    margin-top: 6px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px;
    font-size: 15px;
  }
  button {
    width: 100%;
    margin-top: 16px;
    border: none;
    background: #2563eb;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  .result { margin-top: 20px; display: grid; gap: 14px; }
  .card {
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px;
  }
  .card h3 { margin: 0 0 8px; font-size: 17px; }
  .metric { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #dbe2ea; }
  .metric:last-child { border-bottom: none; }
  .plan-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  }
  .day-title { font-weight: 700; margin-bottom: 6px; }
  .hint { color: #6b7280; font-size: 13px; margin-top: 6px; }
  .warning { color: #b91c1c; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <h1>BMI + 热量 + 碳循环减脂网站</h1>
  <p class="subtitle">输入你的身体数据，自动生成每日热量与高/中/低碳日三大营养素方案。</p>

  <div class="grid">
    <label>身高 (cm)
      <input id="height" type="number" min="120" max="230" placeholder="例如 170" />
    </label>
    <label>当前体重 (kg)
      <input id="weight" type="number" min="30" max="250" step="0.1" placeholder="例如 68" />
    </label>
    <label>目标体重 (kg)
      <input id="targetWeight" type="number" min="30" max="250" step="0.1" placeholder="例如 60" />
    </label>
    <label>年龄
      <input id="age" type="number" min="10" max="90" placeholder="例如 28" />
    </label>
    <label>性别
      <select id="gender">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </label>
    <label>活动水平
      <select id="activity">
        <option value="1.2">久坐（几乎不运动）</option>
        <option value="1.375">轻量活动（每周1-3次）</option>
        <option value="1.55" selected>中等活动（每周3-5次）</option>
        <option value="1.725">高强度活动（每周6-7次）</option>
      </select>
    </label>
    <label>减脂强度
      <select id="deficitRate">
        <option value="0.12">温和（-12%）</option>
        <option value="0.18" selected>标准（-18%）</option>
        <option value="0.25">积极（-25%）</option>
      </select>
    </label>
    <label>每周训练天数
      <select id="trainDays">
        <option value="3">3天</option>
        <option value="4" selected>4天</option>
        <option value="5">5天</option>
        <option value="6">6天</option>
      </select>
    </label>
  </div>

  <button onclick="calculatePlan()">生成减脂与碳循环计划</button>
  <div id="result" class="result"></div>
</div>

<script>
function calculatePlan() {
  const height = parseFloat(document.getElementById('height').value);
  const weight = parseFloat(document.getElementById('weight').value);
  const targetWeight = parseFloat(document.getElementById('targetWeight').value);
  const age = parseFloat(document.getElementById('age').value);
  const gender = document.getElementById('gender').value;
  const activity = parseFloat(document.getElementById('activity').value);
  const deficitRate = parseFloat(document.getElementById('deficitRate').value);
  const trainDays = parseInt(document.getElementById('trainDays').value, 10);

  const result = document.getElementById('result');

  if (!height || !weight || !targetWeight || !age) {
    result.innerHTML = '<div class="card warning">请完整填写所有基础信息。</div>';
    return;
  }

  if (targetWeight >= weight) {
    result.innerHTML = '<div class="card warning">目标体重应小于当前体重，才能生成减脂计划。</div>';
    return;
  }

  const bmi = weight / ((height / 100) ** 2);
  const targetBmi = targetWeight / ((height / 100) ** 2);

  const bmr = gender === 'male'
    ? 10 * weight + 6.25 * height - 5 * age + 5
    : 10 * weight + 6.25 * height - 5 * age - 161;

  const tdee = bmr * activity;
  const cutCalories = tdee * (1 - deficitRate);

  const loseKg = weight - targetWeight;
  const totalKcalGap = loseKg * 7700;
  const dailyGap = tdee - cutCalories;
  const estimateDays = totalKcalGap / dailyGap;

  const proteinGram = weight * 1.8;

  const highDay = buildMacroDay(cutCalories * 1.10, proteinGram, 0.75, 0.35);
  const lowDay = buildMacroDay(cutCalories * 0.90, proteinGram, 1.00, 0.20);
  const mediumDay = buildMacroDay(cutCalories, proteinGram, 0.85, 0.27);

  const lowDays = Math.max(0, 7 - trainDays - 1);

  result.innerHTML = `
    <div class="card">
      <h3>身体与热量评估</h3>
      <div class="metric"><span>当前 BMI</span><strong>${bmi.toFixed(1)}</strong></div>
      <div class="metric"><span>目标 BMI</span><strong>${targetBmi.toFixed(1)}</strong></div>
      <div class="metric"><span>基础代谢 BMR</span><strong>${Math.round(bmr)} kcal</strong></div>
      <div class="metric"><span>维持热量 TDEE</span><strong>${Math.round(tdee)} kcal</strong></div>
      <div class="metric"><span>建议减脂热量</span><strong>${Math.round(cutCalories)} kcal/天</strong></div>
      <div class="metric"><span>预计减重周期</span><strong>${Math.round(estimateDays)} 天</strong></div>
      <p class="hint">注：周期为理论估算，实际请根据体重变化每2-3周微调热量。</p>
    </div>

    <div class="card">
      <h3>碳循环周计划（示例）</h3>
      <p class="hint">推荐每周：高碳 1 天（大强度训练日）/ 中碳 ${trainDays - 1} 天（普通训练日）/ 低碳 ${lowDays} 天（休息或低活动日）。</p>
      <div class="plan-grid">
        ${renderDayCard('高碳日', highDay, '腿部或高强度训练日')}
        ${renderDayCard('中碳日', mediumDay, '常规力量训练日')}
        ${renderDayCard('低碳日', lowDay, '休息/轻活动日')}
      </div>
    </div>
  `;
}

function buildMacroDay(calories, proteinGram, fatPerKg, carbRatio) {
  const proteinKcal = proteinGram * 4;
  const fatGram = Math.max(0.6 * proteinGram / 1.8, fatPerKg * (proteinGram / 1.8));
  const fatKcal = fatGram * 9;

  const carbTargetKcal = calories * carbRatio;
  const minBaseKcal = proteinKcal + fatKcal;
  const carbKcal = Math.max(carbTargetKcal, calories - minBaseKcal);
  const carbGram = carbKcal / 4;

  const adjustedCalories = proteinKcal + fatKcal + carbKcal;
  return {
    calories: Math.round(adjustedCalories),
    protein: Math.round(proteinGram),
    fat: Math.round(fatGram),
    carb: Math.round(carbGram)
  };
}

function renderDayCard(title, macro, note) {
  return `
    <div class="card">
      <div class="day-title">${title}</div>
      <div class="metric"><span>总热量</span><strong>${macro.calories} kcal</strong></div>
      <div class="metric"><span>蛋白质</span><strong>${macro.protein} g</strong></div>
      <div class="metric"><span>脂肪</span><strong>${macro.fat} g</strong></div>
      <div class="metric"><span>碳水</span><strong>${macro.carb} g</strong></div>
      <div class="hint">${note}</div>
    </div>
  `;
}
</script>
</body>
</html>
