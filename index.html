<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI 与热量缺口计算器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>BMI 与热量缺口计算器</h1>
    <p class="subtitle">输入基础信息，一次得到 BMI、体重状态和建议摄入热量。</p>

    <section class="card">
      <h2>BMI 计算</h2>
      <div class="grid">
        <label>
          身高（cm）
          <input id="height" type="number" min="50" max="250" step="0.1" placeholder="例如 170" />
        </label>
        <label>
          体重（kg）
          <input id="weight" type="number" min="20" max="300" step="0.1" placeholder="例如 65" />
        </label>
      </div>
    </section>

    <section class="card">
      <h2>热量缺口计算</h2>
      <div class="grid">
        <label>
          年龄
          <input id="age" type="number" min="10" max="100" step="1" placeholder="例如 28" />
        </label>

        <label>
          性别
          <select id="sex">
            <option value="male">男</option>
            <option value="female">女</option>
          </select>
        </label>

        <label>
          活动水平
          <select id="activity">
            <option value="1.2">久坐（几乎不运动）</option>
            <option value="1.375">轻度活动（每周 1-3 次）</option>
            <option value="1.55">中度活动（每周 3-5 次）</option>
            <option value="1.725">高强度活动（每周 6-7 次）</option>
            <option value="1.9">非常高（体力劳动或双训）</option>
          </select>
        </label>

        <label>
          每日热量缺口（kcal）
          <input id="deficit" type="number" min="0" max="1500" step="10" value="500" />
        </label>
      </div>
    </section>

    <button id="calculateBtn">开始计算</button>

    <section class="card result" id="result" aria-live="polite">
      <h2>结果</h2>
      <p id="bmiResult">BMI：-</p>
      <p id="bmiCategory">体重状态：-</p>
      <p id="tdeeResult">维持热量（TDEE）：-</p>
      <p id="targetResult">建议减脂摄入：-</p>
      <small>说明：热量估算基于 Mifflin-St Jeor 公式，仅用于健康管理参考。</small>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
